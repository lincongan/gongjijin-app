<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>公积金分割器</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="公积金分割器">
    <meta name="theme-color" content="#5c6bc0">
    <meta name="description" content="按比例分配公积金数值的工具">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" sizes="192x192">
    <link rel="icon" href="icon-512.png" sizes="512x512">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8eaf6 0%, #f3e5f5 50%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top, 0px));
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            padding-left: calc(20px + env(safe-area-inset-left, 0px));
            padding-right: calc(20px + env(safe-area-inset-right, 0px));
            color: #333;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-overflow-scrolling: touch;
        }

        .app {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0,0,0,0.04);
            max-width: 600px;
            width: 100%;
            padding: 36px;
            margin: 20px 0;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header-icon { font-size: 44px; margin-bottom: 6px; }
        .header h1 {
            font-size: 26px;
            color: #1a1a2e;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .header p { color: #999; font-size: 13px; }

        /* Steps */
        .step { margin-bottom: 22px; transition: opacity 0.3s; }
        .step.disabled { opacity: 0.4; pointer-events: none; }
        .step-label {
            font-size: 14px;
            font-weight: 700;
            color: #444;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5c6bc0, #7e57c2);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .step-hint { font-size: 12px; color: #bbb; font-weight: 400; }

        /* Fund Input */
        .fund-input-wrap { position: relative; }
        .fund-input {
            width: 100%;
            padding: 16px 20px 16px 46px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 600;
            outline: none;
            color: #1a1a2e;
            transition: all 0.2s;
            -webkit-user-select: text;
            user-select: text;
            -webkit-appearance: none;
        }
        .fund-input:focus {
            border-color: #5c6bc0;
            box-shadow: 0 0 0 4px rgba(92, 107, 192, 0.1);
        }
        .fund-input-prefix {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #bbb;
            font-weight: 600;
        }

        /* Button Groups — stay on one row */
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }
        .select-btn {
            flex: 1;
            min-width: 0;
            padding: 14px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #fff;
            font-size: 15px;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            text-align: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .select-btn:hover {
            border-color: #5c6bc0;
            color: #5c6bc0;
            transform: translateY(-2px);
        }
        .select-btn.active {
            background: linear-gradient(135deg, #5c6bc0, #7e57c2);
            border-color: transparent;
            color: #fff;
            transform: scale(1.03);
            box-shadow: 0 6px 16px rgba(92, 107, 192, 0.35);
        }
        .select-btn.active::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 7px;
            font-size: 11px;
        }

        /* Person Rows — input + result on same row */
        .person-rows { display: none; margin-bottom: 8px; }
        .person-rows.visible { display: flex; flex-direction: column; gap: 10px; }

        .person-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9ff;
            border: 1px solid #e8edff;
            border-radius: 12px;
            padding: 12px 14px;
            transition: all 0.3s;
            flex-wrap: nowrap;
        }
        .person-row:focus-within {
            border-color: #5c6bc0;
            box-shadow: 0 0 0 3px rgba(92, 107, 192, 0.06);
        }
        .person-row.highlight {
            background: linear-gradient(135deg, #fff8e1, #fff3c4);
            border-color: #ffe082;
            box-shadow: 0 2px 8px rgba(255, 152, 0, 0.12);
        }
        .person-avatar {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5c6bc0, #7e57c2);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .person-row.highlight .person-avatar {
            background: linear-gradient(135deg, #f57c00, #ff9800);
        }
        .person-label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .person-input {
            flex: 1;
            min-width: 60px;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            background: #fff;
            text-align: right;
            color: #1a1a2e;
            transition: border-color 0.2s;
            -webkit-user-select: text;
            user-select: text;
            -webkit-appearance: none;
        }
        .person-input:focus { border-color: #5c6bc0; }
        .person-input::placeholder { color: #ccc; font-weight: 400; font-size: 13px; }

        .person-arrow {
            color: #ccc;
            font-size: 16px;
            flex-shrink: 0;
            transition: color 0.3s;
        }
        .person-row.has-result .person-arrow { color: #5c6bc0; }
        .person-row.highlight .person-arrow { color: #f57c00; }

        .person-result {
            flex: 1;
            min-width: 60px;
            padding: 10px 12px;
            text-align: center;
            font-weight: 700;
            font-size: 17px;
            color: #bbb;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .person-row.has-result .person-result {
            color: #5c6bc0;
            border-color: #c5cae9;
            background: #f5f6ff;
        }
        .person-row.highlight .person-result {
            color: #e65100;
            border-color: #ffe082;
            background: #fffde7;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }
        .calculate-btn {
            flex: 1;
            padding: 16px;
            background: linear-gradient(135deg, #5c6bc0, #7e57c2);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 2px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .calculate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(92, 107, 192, 0.4);
        }
        .calculate-btn:active:not(:disabled) { transform: translateY(0); }
        .calculate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .reset-btn {
            padding: 16px 22px;
            background: #fff;
            color: #999;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .reset-btn:hover { border-color: #e57373; color: #e57373; }

        /* Error */
        .error-msg {
            color: #e53935;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .error-msg.show { display: block; }

        /* Summary */
        .summary {
            display: none;
            text-align: center;
            margin-top: 18px;
            padding: 14px 16px;
            background: linear-gradient(135deg, #f5f5f5, #fafafa);
            border-radius: 12px;
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }
        .summary.show { display: block; animation: fadeIn 0.4s ease; }
        .summary strong { color: #1a1a2e; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive — keep one-row layout */
        @media (max-width: 520px) {
            .app { padding: 22px 14px; border-radius: 16px; }
            .header h1 { font-size: 22px; }
            .header-icon { font-size: 36px; }

            .select-btn { padding: 14px 6px; font-size: 14px; }

            .person-row { gap: 6px; padding: 10px 10px; }
            .person-avatar { width: 28px; height: 28px; font-size: 11px; }
            .person-label { font-size: 12px; }
            .person-input { font-size: 14px; padding: 8px 8px; min-width: 50px; }
            .person-result { min-width: 50px; font-size: 15px; padding: 8px 8px; }
            .person-arrow { font-size: 14px; }

            .calculate-btn { font-size: 15px; padding: 14px; }
            .reset-btn { padding: 14px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">💰</div>
            <h1>公积金分割器</h1>
            <p>按比例分配数值 · 余额归最高占比者</p>
        </div>

        <!-- Step 1: Fund Value -->
        <div class="step" id="step1">
            <div class="step-label">
                <span class="step-number">1</span>
                输入公积金数值
            </div>
            <div class="fund-input-wrap">
                <span class="fund-input-prefix">¥</span>
                <input type="number" class="fund-input" id="fundValue" placeholder="请输入数值" step="0.01" min="0">
            </div>
        </div>

        <!-- Step 2: Min Split Unit -->
        <div class="step disabled" id="step2">
            <div class="step-label">
                <span class="step-number">2</span>
                选择最小分割单位
            </div>
            <div class="button-group">
                <button class="select-btn" data-type="unit" data-value="10">10元</button>
                <button class="select-btn" data-type="unit" data-value="100">100元</button>
            </div>
        </div>

        <!-- Step 3: Number of People -->
        <div class="step disabled" id="step3">
            <div class="step-label">
                <span class="step-number">3</span>
                选择分割人数
            </div>
            <div class="button-group">
                <button class="select-btn" data-type="people" data-value="2">2 人</button>
                <button class="select-btn" data-type="people" data-value="3">3 人</button>
                <button class="select-btn" data-type="people" data-value="4">4 人</button>
            </div>
        </div>

        <!-- Step 4: Person Inputs + Results (same row) -->
        <div class="step disabled" id="step4">
            <div class="step-label">
                <span class="step-number">4</span>
                输入个人金额
            </div>
            <div class="person-rows" id="personRows"></div>
        </div>

        <!-- Actions -->
        <div class="btn-row">
            <button class="calculate-btn" id="calculateBtn" disabled>计 算 分 割 结 果</button>
            <button class="reset-btn" id="resetBtn">↻ 重置</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="summary" id="summary"></div>
    </div>

    <script>
        let selectedUnit = null;
        let selectedPeople = null;

        const fundInput   = document.getElementById('fundValue');
        const step2       = document.getElementById('step2');
        const step3       = document.getElementById('step3');
        const step4       = document.getElementById('step4');
        const personRows  = document.getElementById('personRows');
        const calculateBtn = document.getElementById('calculateBtn');
        const errorMsg    = document.getElementById('errorMsg');
        const summaryDiv  = document.getElementById('summary');

        /* ── fund input ── */
        fundInput.addEventListener('input', () => {
            const ok = fundInput.value !== '' && parseFloat(fundInput.value) > 0;
            step2.classList.toggle('disabled', !ok);
            if (!ok) {
                step3.classList.add('disabled');
                step4.classList.add('disabled');
            }
            checkCalcBtn();
        });

        /* ── button selection ── */
        document.querySelectorAll('.select-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                if (this.closest('.disabled')) return;
                const type  = this.dataset.type;
                const value = parseInt(this.dataset.value);

                document.querySelectorAll(`.select-btn[data-type="${type}"]`).forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                if (type === 'unit') {
                    selectedUnit = value;
                    step3.classList.remove('disabled');
                } else if (type === 'people') {
                    selectedPeople = value;
                    buildPersonRows();
                }
                checkCalcBtn();
            });
        });

        /* ── build person rows ── */
        function buildPersonRows() {
            personRows.innerHTML = '';
            for (let i = 0; i < selectedPeople; i++) {
                const row = document.createElement('div');
                row.className = 'person-row';
                row.setAttribute('data-index', i);
                row.innerHTML = `
                    <div class="person-avatar">${i + 1}</div>
                    <span class="person-label">第${i + 1}人</span>
                    <input type="number" class="person-input" placeholder="输入数值" step="0.01" min="0">
                    <span class="person-arrow">→</span>
                    <div class="person-result">—</div>
                `;
                personRows.appendChild(row);
            }

            personRows.classList.add('visible');
            step4.classList.remove('disabled');

            document.querySelectorAll('.person-input').forEach(inp => inp.addEventListener('input', checkCalcBtn));
            summaryDiv.classList.remove('show');
        }

        /* ── enable calc button ── */
        function checkCalcBtn() {
            const fund = fundInput.value;
            const hasUnit   = selectedUnit !== null;
            const hasPeople = selectedPeople !== null;
            let allFilled = false;
            if (hasPeople) {
                const inputs = document.querySelectorAll('.person-input');
                allFilled = Array.from(inputs).every(i => i.value !== '' && parseFloat(i.value) >= 0);
            }
            calculateBtn.disabled = !(fund && parseFloat(fund) > 0 && hasUnit && hasPeople && allFilled);
        }

        /* ── format number ── */
        function fmt(n) {
            const r = Math.round(n * 100) / 100;
            return Number.isInteger(r) ? r.toString() : r.toFixed(2);
        }

        /* ── calculate ── */
        function calculate() {
            const fund     = parseFloat(fundInput.value);
            const minUnit  = selectedUnit;
            const nPeople  = selectedPeople;

            errorMsg.classList.remove('show');

            if (isNaN(fund) || fund <= 0) { showErr('请输入有效的公积金数值'); return; }

            const vals = [];
            for (let i = 0; i < nPeople; i++) {
                const v = parseFloat(document.querySelector(`.person-row[data-index="${i}"] .person-input`).value);
                if (isNaN(v) || v < 0) { showErr(`第${i + 1}人的数值无效`); return; }
                vals.push(v);
            }
            const totalVals = vals.reduce((a, b) => a + b, 0);
            if (totalVals === 0) { showErr('分割数值总和不能为 0'); return; }

            /* ---- core algorithm: round to nearest unit ---- */
            const shares = [];
            let allocated = 0;
            for (let i = 0; i < nPeople; i++) {
                const raw = fund * vals[i] / totalVals;
                const rounded = Math.round(raw / minUnit) * minUnit;
                shares.push(rounded);
                allocated += rounded;
            }
            const remainder = Math.round((fund - allocated) * 100) / 100;

            let maxIdx = 0, maxProp = -1;
            for (let i = 0; i < nPeople; i++) {
                const p = vals[i] / totalVals;
                if (p > maxProp) { maxProp = p; maxIdx = i; }
            }
            shares[maxIdx] = Math.round((shares[maxIdx] + remainder) * 100) / 100;

            /* ---- update row results ---- */
            for (let i = 0; i < nPeople; i++) {
                const row    = document.querySelector(`.person-row[data-index="${i}"]`);
                const result = row.querySelector('.person-result');
                const proportion = (vals[i] / totalVals * 100).toFixed(1);

                row.classList.remove('highlight', 'has-result');
                row.classList.add('has-result');

                if (i === maxIdx && remainder !== 0) {
                    row.classList.add('highlight');
                    result.textContent = fmt(shares[i]);
                } else {
                    result.textContent = fmt(shares[i]);
                }
            }

            /* ---- summary ---- */
            const totalAlloc = shares.reduce((a, b) => a + b, 0);
            summaryDiv.innerHTML = `
                公积金总额：<strong>${fmt(fund)}</strong> ·
                最小分割单位：<strong>${minUnit}</strong> ·
                分割人数：<strong>${nPeople} 人</strong><br>
                分割后合计：<strong>${fmt(totalAlloc)}</strong>
                ${remainder !== 0
                    ? `· 余额 <strong>${fmt(remainder)}</strong> 归第${maxIdx + 1}人`
                    : '· 完美分割 ✓'}
            `;
            summaryDiv.classList.add('show');
        }

        function showErr(m) { errorMsg.textContent = m; errorMsg.classList.add('show'); summaryDiv.classList.remove('show'); }

        calculateBtn.addEventListener('click', calculate);

        /* ── reset ── */
        resetBtn.addEventListener('click', () => {
            selectedUnit   = null;
            selectedPeople = null;
            fundInput.value = '';
            personRows.innerHTML = '';
            personRows.classList.remove('visible');
            document.querySelectorAll('.select-btn').forEach(b => b.classList.remove('active'));
            step2.classList.add('disabled');
            step3.classList.add('disabled');
            step4.classList.add('disabled');
            calculateBtn.disabled = true;
            errorMsg.classList.remove('show');
            summaryDiv.classList.remove('show');
            fundInput.focus();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !calculateBtn.disabled) calculate();
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
